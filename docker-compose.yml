services:

  app:
    build: .
    container_name: laravel_app

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - db

  db:
    image: mysql:8

    container_name: laravel_db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: legado-ab-fenix

    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin

    container_name: laravel_phpmyadmin

    restart: always

    ports:
      - "8080:80"

    environment:
      PMA_HOST: db

    depends_on:
      - db